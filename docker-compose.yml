services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ura-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LEADS_FILE=/data/leads.jsonl
      # LLM + Firecrawl pipeline. Keys come from Coolify's env config —
      # DO NOT commit them. If either is unset the new municipal_web
      # adapter + cross-validation step degrade to a no-op outcome
      # instead of breaking the evaluate request.
      - LLM_CACHE_DIR=/data/llm-cache
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - URA_LLM_MODEL=${URA_LLM_MODEL:-claude-sonnet-4-6}
    volumes:
      # Append-only lead log + LLM/Firecrawl disk cache (7-day TTL).
      # Both survive container restarts so deploys don't lose cached
      # scrapes / extractions.
      - ura-data:/data
    networks:
      - ura
      - coolify

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ura-web
    restart: unless-stopped
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.ura.rule=Host(`urban-renewal-analyzer.byclick.co.il`)
      - traefik.http.routers.ura.entrypoints=https
      - traefik.http.routers.ura.tls=true
      - traefik.http.routers.ura.tls.certresolver=letsencrypt
      - traefik.http.services.ura.loadbalancer.server.port=80
      - traefik.docker.network=coolify
    networks:
      - ura
      - coolify

volumes:
  ura-data:

networks:
  ura:
    driver: bridge
  coolify:
    external: true
    name: coolify
