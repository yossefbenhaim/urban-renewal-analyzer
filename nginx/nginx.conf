events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy.
    location /api/ {
      proxy_pass         http://api:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # SPA routing — every other path falls back to index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Asset caching — long-cache static assets, no-cache index.html.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable, max-age=31536000";
    }
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }
}
